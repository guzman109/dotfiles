"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
format = """
[ŅéČ](red)\
$os\
$username\
[Ņé┤](bg:mauve fg:red)\
${custom.kitty}\
[Ņé┤](bg:peach fg:mauve)\
${custom.claude}\
[Ņé┤](bg:maroon fg:peach)\
$directory\
[Ņé┤](bg:yellow fg:maroon)\
$git_branch\
$git_status\
[Ņé┤](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$zig\
${custom.cppcompiler}\
${custom.cppstd}\
$cmake\
[Ņé┤](fg:green bg:sapphire)\
${custom.motivation}\
[Ņé┤](fg:sapphire bg:lavender)\
$time\
${custom.battery_charging}\
${custom.battery_critical}\
${custom.battery_low}\
${custom.battery_medium_low}\
${custom.battery_medium}\
${custom.battery_good}\
$line_break\
$character\
"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "Ņ£Å"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
AOSC = "’īü"
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[custom.kitty]
command = "kitty --version 2>&1 | grep -o '[0-9]\\.[0-9][0-9]\\.[0-9]' | head -1 | sed 's/^/v/'"
when = "test -n \"$KITTY_WINDOW_ID\""
symbol = "¾░äø"
style = "bg:mauve"
format = '[[ $symbol $output ](fg:crust bg:mauve)]($style)'

[custom.claude]
command = """
model=$(jq -r '.model // "sonnet"' ~/.claude/settings.json 2>/dev/null)
case "$model" in
  opus) echo "Opus 4.5" ;;
  sonnet) echo "Sonnet 4" ;;
  haiku) echo "Haiku 3.5" ;;
  *) echo "$model" ;;
esac
"""
when = "test -f ~/.claude/settings.json"
symbol = "¾▒Üź"
style = "bg:peach"
format = '[[ $symbol $output ](fg:crust bg:peach)]($style)'
shell = ["bash"]

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:maroon fg:crust"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Projects" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Ņś× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Ņśł"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "Ņśå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[zig]
symbol = "ŅŻ»"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[custom.cppstd]
command = "grep 'CMAKE_CXX_STANDARD' CMakeLists.txt 2>/dev/null | grep -o '[0-9][0-9]' | head -1"
when = 'test -f CMakeLists.txt'
symbol = "¾░Ö▓"
style = "bg:green"
format = '[[ $symbol $output ](fg:crust bg:green)]($style)'

[cpp]
disabled = true
symbol = "ŅĀŻ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
detect_files = ["CMakeLists.txt"]

[custom.cppcompiler]
command = "~/.config/starship/cpp-compiler.sh"
when = 'test -f CMakeLists.txt'
style = "bg:green"
format = '[[ $output ](fg:crust bg:green)]($style)'

[cmake]
symbol = "Ņ×ö"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[fill]
symbol = "┬Ę"
style = "fg:overlay0"

[docker_context]
symbol = "’īł"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[custom.motivation]
command = "fish ~/.config/inspiration/quote-cache.fish --type encouragement"
when = "test -z \"$NVIM\""
symbol = "Ņ░É"
style = "bg:sapphire"
format = '[[ $symbol $output ](fg:crust bg:sapphire)]($style)'

[custom.battery_charging]
command = """
pct=$(pmset -g batt | grep -Eo "\\d+%" | cut -d% -f1)
echo "¾░éä $pct%"
"""
when = "pmset -g batt | grep -q 'AC Power'"
format = "[Ņé┤](bg:green fg:lavender)[ $output ](fg:crust bg:green)[Ņé┤](fg:green)"
shell = ["bash"]

[custom.battery_critical]
command = """
pct=$(pmset -g batt | grep -Eo "\\d+%" | cut -d% -f1)
echo "¾░ó¤ $pct%"
"""
when = "pmset -g batt | grep -Eo '\\d+%' | cut -d% -f1 | awk '{exit !($1 <= 10)}' && ! pmset -g batt | grep -q 'AC Power'"
format = "[Ņé┤](bg:red fg:lavender)[ $output ](fg:crust bg:red)[Ņé┤](fg:red)"
shell = ["bash"]

[custom.battery_low]
command = """
pct=$(pmset -g batt | grep -Eo "\\d+%" | cut -d% -f1)
echo "¾░éā $pct%"
"""
when = "pmset -g batt | grep -Eo '\\d+%' | cut -d% -f1 | awk '{exit !($1 > 10 && $1 <= 20)}' && ! pmset -g batt | grep -q 'AC Power'"
format = "[Ņé┤](bg:maroon fg:lavender)[ $output ](fg:crust bg:maroon)[Ņé┤](fg:maroon)"
shell = ["bash"]

[custom.battery_medium_low]
command = """
pct=$(pmset -g batt | grep -Eo "\\d+%" | cut -d% -f1)
echo "¾░éā $pct%"
"""
when = "pmset -g batt | grep -Eo '\\d+%' | cut -d% -f1 | awk '{exit !($1 > 20 && $1 <= 30)}' && ! pmset -g batt | grep -q 'AC Power'"
format = "[Ņé┤](bg:peach fg:lavender)[ $output ](fg:crust bg:peach)[Ņé┤](fg:peach)"
shell = ["bash"]

[custom.battery_medium]
command = """
pct=$(pmset -g batt | grep -Eo "\\d+%" | cut -d% -f1)
echo "¾░éā $pct%"
"""
when = "pmset -g batt | grep -Eo '\\d+%' | cut -d% -f1 | awk '{exit !($1 > 30 && $1 <= 50)}' && ! pmset -g batt | grep -q 'AC Power'"
format = "[Ņé┤](bg:yellow fg:lavender)[ $output ](fg:crust bg:yellow)[Ņé┤](fg:yellow)"
shell = ["bash"]

[custom.battery_good]
command = """
pct=$(pmset -g batt | grep -Eo "\\d+%" | cut -d% -f1)
echo "¾░ü╣ $pct%"
"""
when = "pmset -g batt | grep -Eo '\\d+%' | cut -d% -f1 | awk '{exit !($1 > 50)}' && ! pmset -g batt | grep -q 'AC Power'"
format = "[Ņé┤](bg:green fg:lavender)[ $output ](fg:crust bg:green)[Ņé┤](fg:green)"
shell = ["bash"]

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:lavender"
format = '[[ ’É║ $time ](fg:crust bg:lavender)]($style)'

[battery]
disabled = false
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éā "
unknown_symbol = "¾░üĮ "
empty_symbol = "¾░éÄ "
format = "[[ $symbol$percentage ]($style)]($style)"

[[battery.display]]
threshold = 10
style = "bg:red fg:crust"
charging_symbol = "¾░ó¤ "

[[battery.display]]
threshold = 20
style = "bg:maroon fg:crust"

[[battery.display]]
threshold = 30
style = "bg:peach fg:crust"

[[battery.display]]
threshold = 50
style = "bg:yellow fg:crust"

[[battery.display]]
threshold = 100
style = "bg:lavender fg:crust"


[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[Ōł┤](bold fg:green)'
error_symbol = '[Ōł┤](bold fg:red)'
vimcmd_symbol = '[Ōł┤](bold fg:green)'
vimcmd_replace_one_symbol = '[Ōł┤](bold fg:lavender)'
vimcmd_replace_symbol = '[Ōł┤](bold fg:lavender)'
vimcmd_visual_symbol = '[Ōł┤](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Ņ½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

