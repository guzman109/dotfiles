"$schema" = "https://starship.rs/config-schema.json"

palette = "ember_light"
add_newline = false

format = """${custom.kitty_tabs}$all$time$line_break$character"""

[custom.kitty_tabs]
command = "~/.config/starship/kitty-tabs.sh | tr -d '\n\r'"
when = 'test -n "$KITTY_WINDOW_ID"'
format = "[$output]($style): "
style = "bold mauve"
shell = ["bash", "--noprofile", "--norc"]

[time]
disabled = false
time_format = "%a %b %e %I:%M %P"
format = "[$time]($style) "
style = "mauve"
[character]
success_symbol = "[❯](bold gold)"
error_symbol = "[❯](bold coral)"
vimcmd_symbol = "[❮](bold sage)"
vimcmd_visual_symbol = "[❮](bold gold)"
vimcmd_replace_symbol = "[❮](bold mauve)"
vimcmd_replace_one_symbol = "[❮](bold mauve)"

[python]
symbol = " "
version_format = "${raw}"
format = "[$symbol$version]($style) "
style = "gold"

[zig]
symbol = " "
format = "[$symbol$version]($style) "
style = "gold"

[nodejs]
symbol = " "
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []
format = "[$symbol$version]($style) "
style = "sage"

[rust]
symbol = " "
version_format = "${raw}"
format = "[$symbol$version]($style) "
style = "coral"

[golang]
symbol = " "
format = "[$symbol$version]($style) "
style = "sage"

[java]
symbol = " "
format = "[$symbol$version]($style) "
style = "orange"

[kotlin]
symbol = " "
format = "[$symbol$version]($style) "
style = "orange"

[lua]
symbol = " "
format = "[$symbol$version]($style) "
style = "gold"

[php]
symbol = " "
format = "[$symbol$version]($style) "
style = "orange"

[c]
symbol = " "
format = "[$symbol$version]($style) "
style = "gold"

[cpp]
symbol = " "
format = "[$symbol$version]($style) "
style = "gold"

[cmake]
symbol = " "
format = "[$symbol$version]($style) "
style = "gold"

[ruby]
symbol = " "
version_format = "${raw}"
format = "[$symbol$version]($style) "
style = "coral"

[swift]
symbol = " "
version_format = "${raw}"
format = "[$symbol$version]($style) "
style = "coral"

[nix_shell]
symbol = " "
format = "[$symbol$state( $name)]($style) "
style = "steel"

[docker_context]
symbol = " "

[package]
symbol = "󰏗 "

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰁿 "
unknown_symbol = "󰂑 "
empty_symbol = "󰂎 "

